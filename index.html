<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYROOO TOPUP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#fff;
color:#111;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:30px;
font-weight:bold;
}

nav a{
text-decoration:none;
color:#111;
margin-left:25px;
font-weight:bold;
}

.btn{
padding:12px 25px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.login{
background:#111;
color:#fff;
}

.register{
background:#fff;
color:#111;
border:2px solid #111;
}

.hero{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:80vh;
text-align:center;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#555;
margin-bottom:30px;
}

.hero button{
padding:16px 40px;
font-size:18px;
background:#111;
color:#fff;
border:none;
border-radius:15px;
cursor:pointer;
}

.section{
padding:60px;
}

.title{
font-size:35px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
border:1px solid #ddd;
border-radius:18px;
padding:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.card img{
width:70px;
margin-bottom:15px;
}

.card h3{
margin-bottom:8px;
}

.buy{
margin-top:15px;
width:100%;
padding:12px;
background:#111;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

footer{
margin-top:60px;
padding:30px;
text-align:center;
border-top:1px solid #ddd;
color:#777;
}
</style>

</head>

<body>

<header>

<div class="logo">
XYROOO TOPUP
</div>

<nav>
<a href="#">Home</a>
<a href="#">Topup</a>
<a href="#">Riwayat</a>
<a href="#">Kontak</a>

<button class="btn login">
Login
</button>

<button class="btn register">
Register
</button>

</nav>

</header>

<section class="hero">

<h1>Top Up Game Cepat & Otomatis</h1>

<p>
24 Jam • Harga Murah • Proses Instan
</p>

<button>
Top Up Sekarang
</button>

</section>

<section class="section">

<h2 class="title">
Game Populer
</h2>

<div class="grid">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
<h3>Mobile Legends</h3>
<p>Diamond ML</p>
<button class="buy">Beli Sekarang</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
<h3>Free Fire</h3>
<p>Diamond FF</p>
<button class="buy">Beli Sekarang</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
<h3>PUBG Mobile</h3>
<p>UC PUBG</p>
<button class="buy">Beli Sekarang</button>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
<h3>Honor Of Kings</h3>
<p>Token HOK</p>
<button class="buy">Beli Sekarang</button>
</div>

</div>

</section>

<footer>

© 2026 XYROOO TOPUP
<br>
Website Top Up Game Premium

</footer>

</body>
</html>
